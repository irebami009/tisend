
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trisend Custom Domains</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,sans-serif;
}

html, body{
  width:100%;
  overflow-x:hidden;
}

/* BODY */
body{
  display:flex;
  min-height:100vh;
  background:#0b1220;
  color:#fff;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#0a1022;
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  border-right:1px solid rgba(255,255,255,0.08);
  transition:0.35s ease;
  z-index:999;
}

.logo{
  font-size:20px;
  font-weight:800;
  color:#3b82f6;
  margin-bottom:25px;
}

.nav a{
  display:block;
  padding:12px;
  margin-bottom:8px;
  border-radius:10px;
  text-decoration:none;
  color:#e2e8f0;
  transition:0.2s;
  font-weight:500;
}

.nav a:hover{
  background:rgba(59,130,246,0.2);
  color:#fff;
}

.toggle{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:#fff;
  cursor:pointer;
  width:100%;
}

/* MAIN */
.main{
  flex:1;
  padding:30px;
  width:100%;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.btn{
  background:#3b82f6;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  color:#fff;
  cursor:pointer;
  transition:0.2s ease;
}

.btn:hover{
  opacity:0.9;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  margin-top:20px;
}

.card{
  background:#111a2e;
  padding:18px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.05);
}

.card h3{
  margin-bottom:10px;
}

.status{
  display:inline-block;
  margin-top:8px;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}

.active{
  background:rgba(34,197,94,0.15);
  color:#22c55e;
}

.pending{
  background:rgba(234,179,8,0.15);
  color:#facc15;
}

.failed{
  background:rgba(239,68,68,0.15);
  color:#ef4444;
}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  background:#111a2e;
  border-radius:12px;
  overflow:hidden;
}

th,td{
  padding:14px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  text-align:left;
}

th{
  color:#94a3b8;
}

.copy{
  background:#1f2a44;
  border:none;
  padding:7px 12px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

.box{
  background:#0f172a;
  padding:20px;
  border-radius:14px;
  width:350px;
}

.box h3{
  margin-bottom:10px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.1);
  background:#0b1220;
  color:#fff;
  outline:none;
}

/* TOPBAR */
.topbar{
  position:fixed;
  top:15px;
  right:15px;
  z-index:1001;
}

/* MENU BUTTON */
.hamburger{
  display:none;
  width:45px;
  height:45px;
  border:none;
  border-radius:12px;
  background:#111a2e;
  color:#fff;
  font-size:22px;
  cursor:pointer;
  transition:0.2s ease;
}

.hamburger:hover{
  background:#1e293b;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(4px);
  opacity:0;
  visibility:hidden;
  transition:0.3s ease;
  z-index:998;
}

.overlay.active{
  opacity:1;
  visibility:visible;
}

/* RESPONSIVE */
@media (max-width:900px){

  body{
    flex-direction:column;
  }

  .hamburger{
    display:block;
  }

  .sidebar{
    position:fixed;
    left:0;
    top:0;
    height:100%;
    width:280px;
    transform:translateX(-110%);
    box-shadow:10px 0 30px rgba(0,0,0,0.4);
  }

  .sidebar.active{
    transform:translateX(0);
  }

  .main{
    padding:80px 15px 20px;
  }

  .grid{
    grid-template-columns:1fr;
  }

  .header{
    flex-direction:column;
    align-items:flex-start;
    gap:12px;
  }

  .btn{
    width:100%;
  }

  table{
    display:block;
    overflow-x:auto;
    white-space:nowrap;
  }

  .box{
    width:90%;
  }
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <button class="hamburger" onclick="toggleSidebar()" id="menuBtn">
    ☰
  </button>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar">

  <div>
    <div class="logo">TRISEND</div>

    <div class="nav">
      <a href="#">Dashboard</a>
      <a href="#">Custom Domains</a>
      <a href="#">Links</a>
      <a href="#">Analytics</a>
      <a href="#">Settings</a>
    </div>
  </div>

  <button class="toggle" onclick="toggleTheme()">
    Toggle Theme
  </button>

</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <h2>Custom Domains</h2>

    <button class="btn" onclick="openModal()">
      + Add Domain
    </button>
  </div>

  <!-- CARDS -->
  <div class="grid">

    <div class="card">
      <h3>go.trisend.ng</h3>
      <span class="status active">Active</span>
    </div>

    <div class="card">
      <h3>links.brand.com</h3>
      <span class="status pending">Pending</span>
    </div>

    <div class="card">
      <h3>s.mybrand.io</h3>
      <span class="status failed">Failed</span>
    </div>

  </div>

  <!-- DNS TABLE -->
  <h3 style="margin-top:30px;">DNS Records</h3>

  <table>

    <tr>
      <th>Type</th>
      <th>Name</th>
      <th>Value</th>
      <th>Action</th>
    </tr>

    <tr>
      <td>CNAME</td>
      <td>go</td>
      <td>cname.trisend.app</td>
      <td>
        <button class="copy" onclick="copy('CNAME copied')">
          Copy
        </button>
      </td>
    </tr>

    <tr>
      <td>TXT</td>
      <td>@</td>
      <td>trisend-verify</td>
      <td>
        <button class="copy" onclick="copy('TXT copied')">
          Copy
        </button>
      </td>
    </tr>

  </table>

</div>

<!-- MODAL -->
<div class="modal" id="modal">

  <div class="box">

    <h3>Add Domain</h3>

    <input placeholder="go.mybrand.com"/>

    <button class="btn" style="margin-top:15px;" onclick="closeModal()">
      Save
    </button>

  </div>

</div>

<script>

/* MODAL */
function openModal(){
  document.getElementById('modal').style.display='flex'
}

function closeModal(){
  document.getElementById('modal').style.display='none'
}

/* THEME */
function toggleTheme(){
  document.body.classList.toggle('light')
}

/* COPY */
function copy(text){
  navigator.clipboard.writeText(text)
  alert(text)
}

/* SIDEBAR */
function toggleSidebar(){

  const sidebar = document.querySelector('.sidebar')
  const overlay = document.getElementById('overlay')
  const menuBtn = document.getElementById('menuBtn')

  sidebar.classList.toggle('active')
  overlay.classList.toggle('active')

  /* CHANGE ICON */
  if(sidebar.classList.contains('active')){
    menuBtn.innerHTML = '✕'
  }else{
    menuBtn.innerHTML = '☰'
  }
}

/* CLOSE SIDEBAR */
function closeSidebar(){

  document.querySelector('.sidebar').classList.remove('active')
  document.getElementById('overlay').classList.remove('active')

  document.getElementById('menuBtn').innerHTML = '☰'
}

</script>

</body>
</html>
